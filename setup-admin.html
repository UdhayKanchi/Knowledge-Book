<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Setup - One Time Only</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
    body {
      background: radial-gradient(circle at center, #1b0f3a 0%, #0a0616 100%);
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; color: #fff;
    }
    .box {
      background: rgba(15, 10, 30, 0.9);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 255, 204, 0.3);
      border-radius: 15px;
      padding: 40px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 0 40px rgba(0, 255, 204, 0.15);
      text-align: center;
    }
    h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 22px;
      color: #00ffcc;
      text-shadow: 0 0 10px #00ffcc;
      margin-bottom: 10px;
    }
    .warning {
      background: rgba(255, 165, 0, 0.1);
      border: 1px solid orange;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 25px;
      font-size: 13px;
      color: orange;
    }
    .info-row {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(0,255,204,0.2);
      border-radius: 10px;
      padding: 15px 20px;
      margin-bottom: 15px;
      text-align: left;
    }
    .info-row label { font-size: 12px; color: #a5b4fc; text-transform: uppercase; letter-spacing: 1px; }
    .info-row span { font-size: 16px; color: #fff; font-weight: 600; display: block; margin-top: 3px; }
    .btn {
      width: 100%;
      padding: 16px;
      margin-top: 20px;
      border: none;
      border-radius: 10px;
      font-family: 'Orbitron', sans-serif;
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-create { background: linear-gradient(90deg, #00ffcc, #0088ff); color: #000; box-shadow: 0 0 20px rgba(0, 255, 204, 0.4); }
    .btn-create:hover { transform: scale(1.02); box-shadow: 0 0 35px rgba(0, 255, 204, 0.7); color: #fff; }
    .btn-create:disabled { background: #333; color: #666; cursor: not-allowed; transform: none; box-shadow: none; }
    #statusMsg {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      display: none;
    }
    .success { background: rgba(0,255,100,0.1); border: 1px solid #00ff88; color: #00ff88; }
    .error { background: rgba(255,50,50,0.1); border: 1px solid #ff4444; color: #ff4444; }
  </style>
</head>
<body>
  <div class="box">
    <h2>⚙️ Admin Setup</h2>
    <p style="color:#94a3b8; margin-bottom:20px; font-size:14px;">This page creates the admin account in Firebase. Run it once, then delete it.</p>

    <div class="warning">
      ⚠️ <strong>One-Time Use Only!</strong> Delete this file after the admin account is created.
    </div>

    <div class="info-row">
      <label>Admin Email</label>
      <span>knowledgebook@admin.in</span>
    </div>
    <div class="info-row">
      <label>Admin Password</label>
      <span>uday@2349250084</span>
    </div>

    <button class="btn btn-create" id="createBtn" onclick="createAdmin()">
      🚀 Create Admin Account
    </button>

    <div id="statusMsg"></div>
  </div>

  <script type="module">
    import { auth, db } from './firebase-config.js';
    import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const ADMIN_EMAIL = "knowledgebook@admin.in";
    const ADMIN_PASS  = "uday@2349250084";

    window.createAdmin = async function() {
      const btn = document.getElementById('createBtn');
      const msg = document.getElementById('statusMsg');
      btn.disabled = true;
      btn.textContent = "Creating...";
      msg.style.display = 'none';

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, ADMIN_EMAIL, ADMIN_PASS);
        const user = userCredential.user;

        await setDoc(doc(db, "users", user.uid), {
          uid: user.uid,
          name: "Knowledge Book Admin",
          email: ADMIN_EMAIL,
          role: "admin",
          joinDate: new Date().toLocaleDateString()
        });

        msg.className = 'success';
        msg.style.display = 'block';
        msg.innerHTML = `
          ✅ <strong>Admin account created successfully!</strong><br><br>
          You can now log in at <a href="login.html" style="color:#00ffcc;">login.html</a><br>
          <br>⚠️ <strong>Please delete this file (setup-admin.html) from your project now!</strong>
        `;
        btn.textContent = "✅ Done!";

      } catch (error) {
        msg.className = 'error';
        msg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = "🚀 Create Admin Account";

        if (error.code === 'auth/email-already-in-use') {
          msg.innerHTML = '✅ Admin account already exists! You can log in directly at <a href="login.html" style="color:#00ffcc;">login.html</a>';
          msg.className = 'success';
          btn.disabled = true;
        } else {
          msg.textContent = "Error: " + error.code + ". Make sure Firebase is configured correctly.";
        }
      }
    };
  </script>
</body>
</html>
