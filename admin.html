<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowledge Book - Admin Control Center</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #000;
      color: #cbd5e1;
      display: flex;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Racing Game Canvas Background */
    #racingCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* Overlay so content is readable */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.55);
      z-index: 1;
      pointer-events: none;
    }

    /* Sidebar Styles */
    .sidebar {
      width: 280px;
      background: rgba(10, 10, 20, 0.85);
      backdrop-filter: blur(20px);
      border-right: 1px solid rgba(0, 234, 255, 0.15);
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      position: fixed;
      height: 100vh;
      z-index: 100;
    }

    .brand {
      font-size: 24px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 40px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(45deg, #00eaff, #0072ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand i {
      color: #00eaff;
      -webkit-text-fill-color: #00eaff;
    }

    .nav-menu {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }

    .nav-item {
      padding: 14px 20px;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 15px;
      font-weight: 600;
      color: #94a3b8;
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .nav-item:hover, .nav-item.active {
      background: rgba(0, 234, 255, 0.1);
      color: #00eaff;
    }

    .nav-item i {
      font-size: 18px;
      width: 20px;
      text-align: center;
    }

    /* Main Content */
    .main-content {
      margin-left: 280px;
      padding: 40px 50px;
      flex: 1;
      background: transparent;
      min-height: 100vh;
      position: relative;
      z-index: 10;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }

    .header h2 {
      color: #fff;
      font-size: 28px;
      font-weight: 700;
    }

    .admin-profile {
      display: flex;
      align-items: center;
      gap: 15px;
      background: rgba(255, 255, 255, 0.05);
      padding: 10px 20px;
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Dashboard Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 25px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      padding: 25px;
      display: flex;
      align-items: center;
      gap: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .stat-icon {
      width: 60px;
      height: 60px;
      border-radius: 15px;
      background: rgba(0, 234, 255, 0.1);
      color: #00eaff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
    }

    .stat-info h4 {
      color: #94a3b8;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 5px;
    }

    .stat-info .number {
      color: #fff;
      font-size: 28px;
      font-weight: 800;
    }

    /* Sections */
    .section {
      display: none;
      animation: fadeIn 0.5s ease;
    }

    .section.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Upload Form */
    .upload-container {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      padding: 35px;
      max-width: 600px;
    }

    .form-group {
      margin-bottom: 25px;
    }

    label {
      display: block;
      margin-bottom: 10px;
      color: #cbd5e1;
      font-weight: 600;
    }

    input[type="text"], input[type="file"] {
      width: 100%;
      padding: 14px 18px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.2);
      color: #fff;
      font-size: 15px;
      transition: all 0.3s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #00eaff;
      background: rgba(0, 234, 255, 0.05);
    }

    input[type="file"] {
      padding: 12px;
      border: 2px dashed rgba(255, 255, 255, 0.2);
      cursor: pointer;
    }

    .btn-primary {
      background: linear-gradient(135deg, #00eaff, #0072ff);
      color: white;
      border: none;
      padding: 14px 30px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 234, 255, 0.3);
    }

    /* Data Tables */
    .table-container {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th {
      background: rgba(0, 0, 0, 0.3);
      padding: 18px 25px;
      color: #94a3b8;
      font-weight: 600;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    td {
      padding: 18px 25px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      color: #fff;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background: rgba(255, 255, 255, 0.02);
    }

    .btn-delete {
      background: rgba(255, 65, 108, 0.1);
      color: #ff416c;
      border: 1px solid #ff416c;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }

    .btn-delete:hover {
      background: #ff416c;
      color: white;
      box-shadow: 0 5px 15px rgba(255, 65, 108, 0.4);
    }

    .badge {
      background: rgba(0, 234, 255, 0.1);
      color: #00eaff;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }

  </style>
</head>

<body>

  <!-- Racing Game Background -->
  <canvas id="racingCanvas"></canvas>
  <div class="overlay"></div>

  <!-- Route Protection via Firebase Auth -->
  <script type="module">
    import { auth, db, storage } from './firebase-config.js';
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

    onAuthStateChanged(auth, (user) => {
      if (!user || user.email !== "knowledgebook@admin.in") {
        alert("Access Denied: You are not authorized.");
        window.location.replace("index.html");
      }
    });

    // Tab Switching Logic
    const sections = ['dashboard', 'upload', 'notes', 'users'];
    const titles = {
      'dashboard': 'Overview Dashboard',
      'upload': 'Upload Material',
      'notes': 'Manage Notes',
      'users': 'Registered Users'
    };

    window.switchTab = function(tabId, element) {
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      element.classList.add('active');
      document.getElementById('pageTitle').innerText = titles[tabId];
      sections.forEach(sec => document.getElementById(sec).classList.remove('active'));
      document.getElementById(tabId).classList.add('active');

      if(tabId === 'notes' || tabId === 'dashboard') loadNotesData();
      if(tabId === 'users' || tabId === 'dashboard') loadUsersData();
    }

    window.logout = async function() {
      try {
        await signOut(auth);
        localStorage.removeItem('isAdmin');
        window.location.replace("index.html");
      } catch (error) {
        console.error("Error signing out: ", error);
      }
    }

    // --- FIREBASE LOGIC ---

    // 1. Upload Form Logic
    document.getElementById("uploadForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const subject = document.getElementById("subjectInput").value.trim();
      const title = document.getElementById("titleInput").value.trim();
      const fileInput = document.getElementById("fileInput");
      const file = fileInput.files[0];

      if (!subject || !title || !file) {
        alert("Please fill all fields.");
        return;
      }

      // Change button state to show loading
      const submitBtn = this.querySelector('button[type="submit"]');
      const originalText = submitBtn.innerHTML;
      submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Uploading...';
      submitBtn.disabled = true;

      try {
        // Step A: Upload PDF to Firebase Cloud Storage
        const storageRef = ref(storage, `notes/${Date.now()}_${file.name}`);
        const snapshot = await uploadBytes(storageRef, file);
        const downloadURL = await getDownloadURL(snapshot.ref);

        // Step B: Save metadata to Firestore
        await addDoc(collection(db, "notes"), {
          subject: subject,
          title: title,
          fileName: file.name,
          downloadURL: downloadURL,
          storagePath: snapshot.ref.fullPath, // Keep path to delete later
          uploadDate: new Date().toLocaleDateString()
        });

        alert("Note uploaded successfully! It is now live on the website.");
        document.getElementById("uploadForm").reset();
        loadNotesData();

      } catch (error) {
        console.error("Error uploading note: ", error);
        alert("Failed to upload note: " + error.message);
      } finally {
        submitBtn.innerHTML = originalText;
        submitBtn.disabled = false;
      }
    });

    // 2. Fetch Notes from Firestore
    async function loadNotesData() {
      const tbody = document.getElementById('notesTableBody');
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:#00eaff;">Loading notes from Firebase...</td></tr>';
      
      try {
        const querySnapshot = await getDocs(collection(db, "notes"));
        const notes = [];
        querySnapshot.forEach((doc) => {
          notes.push({ id: doc.id, ...doc.data() });
        });

        document.getElementById('statNotes').innerText = notes.length;
        tbody.innerHTML = '';

        if (notes.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:#64748b;">No notes uploaded yet.</td></tr>';
          return;
        }

        notes.forEach(note => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td><span class="badge">${note.subject}</span></td>
            <td style="font-weight: 600;">${note.title}</td>
            <td style="color: #94a3b8;"><i class="fa-regular fa-file-pdf"></i> <a href="${note.downloadURL}" target="_blank" style="color: #00eaff; text-decoration: none;">${note.fileName}</a></td>
            <td>${note.uploadDate}</td>
            <td><button class="btn-delete" onclick="deleteNote('${note.id}', '${note.storagePath}')"><i class="fa-solid fa-trash"></i> Delete</button></td>
          `;
          tbody.appendChild(tr);
        });
      } catch(error) {
        console.error("Error fetching notes:", error);
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:#ff416c;">Error loading notes from Firebase.</td></tr>';
      }
    }

    // 3. Delete Note from Storage and Firestore
    window.deleteNote = async function(docId, storagePath) {
      if (confirm("Are you sure you want to delete this note permanently from Firebase?")) {
        try {
          // Delete from Firestore
          await deleteDoc(doc(db, "notes", docId));
          // Delete from Cloud Storage
          const fileRef = ref(storage, storagePath);
          await deleteObject(fileRef);
          
          alert("Note deleted successfully.");
          loadNotesData(); 
        } catch(error) {
          console.error("Error deleting note: ", error);
          alert("Error deleting note: " + error.message);
        }
      }
    }

    // 4. Fetch Users from Firestore
    async function loadUsersData() {
      const tbody = document.getElementById('usersTableBody');
      tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#00eaff;">Loading users from Firebase...</td></tr>';
      
      try {
        const querySnapshot = await getDocs(collection(db, "users"));
        const users = [];
        querySnapshot.forEach((doc) => {
          users.push(doc.data());
        });

        document.getElementById('statUsers').innerText = users.length;
        tbody.innerHTML = '';

        if (users.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#64748b;">No users registered yet.</td></tr>';
          return;
        }

        users.forEach(user => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td style="font-weight: 600;">${user.name || 'Unknown'}</td>
            <td style="color: #94a3b8;">${user.email}</td>
            <td>${user.joinDate || 'N/A'}</td>
            <td><span style="color: #22c55e; background: rgba(34, 197, 94, 0.1); padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;">Active</span></td>
          `;
          tbody.appendChild(tr);
        });
      } catch(error) {
        console.error("Error fetching users:", error);
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#ff416c;">Error loading users from Firebase.</td></tr>';
      }
    }

    // Initial Load
    loadNotesData();
    loadUsersData();

  </script>

  <!-- Racing Game Animation -->
  <script>
    const canvas = document.getElementById('racingCanvas');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // Perspective road config
    const HORIZON_Y = 0.45; // horizon at 45% height
    const ROAD_WIDTH_FAR = 0.18;
    const ROAD_WIDTH_NEAR = 0.95;
    const LANE_COUNT = 3;
    const SEGMENT_COUNT = 200;
    const CAMERA_DEPTH = 0.84;

    let offset = 0;
    let speed = 0.018;

    // Speed line particles
    const speedLines = Array.from({length: 80}, () => ({
      x: Math.random(),
      y: Math.random() * 0.45 + 0.55,
      len: Math.random() * 0.06 + 0.02,
      alpha: Math.random() * 0.5 + 0.3,
      speed: Math.random() * 0.005 + 0.003
    }));

    // Oncoming headlights / car lights
    const carLights = Array.from({length: 6}, (_, i) => ({
      lane: (i % LANE_COUNT),
      z: Math.random(),
      size: Math.random() * 3 + 2
    }));

    // Stars in the sky
    const stars = Array.from({length: 120}, () => ({
      x: Math.random(),
      y: Math.random() * HORIZON_Y,
      r: Math.random() * 1.5 + 0.3,
      alpha: Math.random() * 0.8 + 0.2
    }));

    function project(z) {
      // Map z (0=far, 1=near) to screen
      const scale = CAMERA_DEPTH / (CAMERA_DEPTH + z);
      const screenY = canvas.height * (HORIZON_Y + (1 - HORIZON_Y) * (z));
      const roadWidthPx = canvas.width * (ROAD_WIDTH_FAR + (ROAD_WIDTH_NEAR - ROAD_WIDTH_FAR) * z);
      return { screenY, roadWidthPx, scale };
    }

    function drawFrame() {
      const W = canvas.width, H = canvas.height;
      ctx.clearRect(0, 0, W, H);

      // Sky gradient
      const sky = ctx.createLinearGradient(0, 0, 0, H * HORIZON_Y);
      sky.addColorStop(0, '#000010');
      sky.addColorStop(0.6, '#0a001f');
      sky.addColorStop(1, '#180530');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, W, H * HORIZON_Y);

      // Draw stars
      stars.forEach(s => {
        ctx.beginPath();
        ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${s.alpha})`;
        ctx.fill();
      });

      // City silhouette on horizon
      ctx.fillStyle = '#050010';
      const buildings = [0.05,0.1,0.06,0.13,0.08,0.04,0.12,0.07,0.09,0.11,0.06,0.14,0.05,0.09];
      let bx = 0;
      buildings.forEach(bh => {
        const bw = W / buildings.length;
        ctx.fillRect(bx, H * HORIZON_Y - bh * H * 0.3, bw - 2, bh * H * 0.3);
        // tiny windows
        ctx.fillStyle = 'rgba(255, 230, 100, 0.4)';
        for(let wy = 0; wy < bh * H * 0.3 - 5; wy += 8) {
          for(let wx = 3; wx < bw - 5; wx += 7) {
            if(Math.random() > 0.5) ctx.fillRect(bx + wx, H * HORIZON_Y - bh * H * 0.3 + wy + 3, 4, 4);
          }
        }
        ctx.fillStyle = '#050010';
        bx += bw;
      });

      // Glow on horizon
      const horizGlow = ctx.createLinearGradient(0, H * HORIZON_Y - 30, 0, H * HORIZON_Y + 10);
      horizGlow.addColorStop(0, 'rgba(0, 100, 255, 0)');
      horizGlow.addColorStop(0.5, 'rgba(0, 200, 255, 0.15)');
      horizGlow.addColorStop(1, 'rgba(0, 100, 255, 0)');
      ctx.fillStyle = horizGlow;
      ctx.fillRect(0, H * HORIZON_Y - 30, W, 40);

      // Ground / road base
      const ground = ctx.createLinearGradient(0, H * HORIZON_Y, 0, H);
      ground.addColorStop(0, '#0a0010');
      ground.addColorStop(1, '#03000a');
      ctx.fillStyle = ground;
      ctx.fillRect(0, H * HORIZON_Y, W, H);

      // Draw road segments (perspective strips)
      const SEGS = 80;
      for (let i = SEGS; i >= 0; i--) {
        const z1 = i / SEGS;
        const z2 = (i + 1) / SEGS;
        const p1 = project(z1);
        const p2 = project(z2);
        const cx = W / 2;

        // Alternate dark road strips
        const segIndex = Math.floor((i + offset * SEGS * 2) % 4);
        const roadColor = segIndex < 2 ? '#1a0030' : '#150025';
        ctx.fillStyle = roadColor;
        ctx.beginPath();
        ctx.moveTo(cx - p1.roadWidthPx / 2, p1.screenY);
        ctx.lineTo(cx + p1.roadWidthPx / 2, p1.screenY);
        ctx.lineTo(cx + p2.roadWidthPx / 2, p2.screenY);
        ctx.lineTo(cx - p2.roadWidthPx / 2, p2.screenY);
        ctx.fill();

        // Road edge neon lines
        if (i % 1 === 0) {
          // Left edge
          ctx.strokeStyle = `rgba(255, 0, 200, ${0.4 * z1})`;
          ctx.lineWidth = 2 * z1 + 0.5;
          ctx.beginPath();
          ctx.moveTo(cx - p1.roadWidthPx / 2, p1.screenY);
          ctx.lineTo(cx - p2.roadWidthPx / 2, p2.screenY);
          ctx.stroke();
          // Right edge
          ctx.strokeStyle = `rgba(0, 200, 255, ${0.4 * z1})`;
          ctx.beginPath();
          ctx.moveTo(cx + p1.roadWidthPx / 2, p1.screenY);
          ctx.lineTo(cx + p2.roadWidthPx / 2, p2.screenY);
          ctx.stroke();
        }

        // Lane dashes
        const dashSeg = Math.floor((i + offset * SEGS * 4) % 8);
        if (dashSeg < 4) {
          ctx.strokeStyle = `rgba(255, 255, 255, ${0.35 * z1})`;
          ctx.lineWidth = 1.5 * z1;
          for (let lane = 1; lane < LANE_COUNT; lane++) {
            const laneX = cx - p1.roadWidthPx / 2 + (p1.roadWidthPx / LANE_COUNT) * lane;
            const laneX2 = cx - p2.roadWidthPx / 2 + (p2.roadWidthPx / LANE_COUNT) * lane;
            ctx.beginPath();
            ctx.moveTo(laneX, p1.screenY);
            ctx.lineTo(laneX2, p2.screenY);
            ctx.stroke();
          }
        }

        // Center yellow line
        ctx.strokeStyle = `rgba(255, 200, 0, ${0.5 * z1})`;
        ctx.lineWidth = 1.5 * z1;
        ctx.beginPath();
        ctx.moveTo(cx, p1.screenY);
        ctx.lineTo(cx, p2.screenY);
        ctx.stroke();
      }

      // Car headlights coming toward camera
      carLights.forEach(car => {
        car.z += speed * 0.8;
        if (car.z > 1) { car.z = 0.02; car.lane = Math.floor(Math.random() * LANE_COUNT); }
        const p = project(car.z);
        const cx = W / 2;
        const laneW = p.roadWidthPx / LANE_COUNT;
        const laneCenter = cx - p.roadWidthPx / 2 + laneW * car.lane + laneW / 2;

        // Headlights
        [-1, 1].forEach(side => {
          const hx = laneCenter + side * 10 * car.z;
          const glowR = ctx.createRadialGradient(hx, p.screenY, 0, hx, p.screenY, 30 * car.z);
          glowR.addColorStop(0, `rgba(255, 240, 180, ${0.9 * car.z})`);
          glowR.addColorStop(0.3, `rgba(255, 200, 80, ${0.4 * car.z})`);
          glowR.addColorStop(1, 'rgba(255, 150, 50, 0)');
          ctx.fillStyle = glowR;
          ctx.beginPath();
          ctx.arc(hx, p.screenY, 30 * car.z, 0, Math.PI * 2);
          ctx.fill();
        });

        // Tail lights of a "passing" car (red)
        const tGlow = ctx.createRadialGradient(laneCenter, p.screenY - 5 * car.z, 0, laneCenter, p.screenY - 5 * car.z, 20 * car.z);
        tGlow.addColorStop(0, `rgba(255, 30, 30, ${0.7 * car.z})`);
        tGlow.addColorStop(1, 'rgba(255, 0, 0, 0)');
        ctx.fillStyle = tGlow;
        ctx.beginPath();
        ctx.arc(laneCenter, p.screenY, 20 * car.z, 0, Math.PI * 2);
        ctx.fill();
      });

      // Speed lines on sides
      speedLines.forEach(sl => {
        sl.x -= sl.speed;
        if (sl.x < 0) { sl.x = 1; sl.y = Math.random() * 0.45 + 0.55; }
        ctx.strokeStyle = `rgba(0, 200, 255, ${sl.alpha * 0.5})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(sl.x * W, sl.y * H);
        ctx.lineTo((sl.x + sl.len) * W, sl.y * H);
        ctx.stroke();
      });

      offset += speed;
      if (offset > 1) offset = 0;

      requestAnimationFrame(drawFrame);
    }

    drawFrame();
  </script>

</body>
