<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowledge Book - Admin Control Center</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0b0f19; /* Premium dark background */
      color: #cbd5e1;
      display: flex;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Sidebar Styles */
    .sidebar {
      width: 280px;
      background: #111827;
      border-right: 1px solid rgba(255, 255, 255, 0.05);
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      position: fixed;
      height: 100vh;
      z-index: 100;
    }

    .brand {
      font-size: 24px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 40px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(45deg, #00eaff, #0072ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand i {
      color: #00eaff;
      -webkit-text-fill-color: #00eaff;
    }

    .nav-menu {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }

    .nav-item {
      padding: 14px 20px;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 15px;
      font-weight: 600;
      color: #94a3b8;
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .nav-item:hover, .nav-item.active {
      background: rgba(0, 234, 255, 0.1);
      color: #00eaff;
    }

    .nav-item i {
      font-size: 18px;
      width: 20px;
      text-align: center;
    }

    /* Main Content */
    .main-content {
      margin-left: 280px;
      padding: 40px 50px;
      flex: 1;
      background: radial-gradient(circle at top right, #1a233a 0%, #0b0f19 60%);
      min-height: 100vh;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }

    .header h2 {
      color: #fff;
      font-size: 28px;
      font-weight: 700;
    }

    .admin-profile {
      display: flex;
      align-items: center;
      gap: 15px;
      background: rgba(255, 255, 255, 0.05);
      padding: 10px 20px;
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Dashboard Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 25px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      padding: 25px;
      display: flex;
      align-items: center;
      gap: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .stat-icon {
      width: 60px;
      height: 60px;
      border-radius: 15px;
      background: rgba(0, 234, 255, 0.1);
      color: #00eaff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
    }

    .stat-info h4 {
      color: #94a3b8;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 5px;
    }

    .stat-info .number {
      color: #fff;
      font-size: 28px;
      font-weight: 800;
    }

    /* Sections */
    .section {
      display: none;
      animation: fadeIn 0.5s ease;
    }

    .section.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Upload Form */
    .upload-container {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      padding: 35px;
      max-width: 600px;
    }

    .form-group {
      margin-bottom: 25px;
    }

    label {
      display: block;
      margin-bottom: 10px;
      color: #cbd5e1;
      font-weight: 600;
    }

    input[type="text"], input[type="file"] {
      width: 100%;
      padding: 14px 18px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.2);
      color: #fff;
      font-size: 15px;
      transition: all 0.3s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #00eaff;
      background: rgba(0, 234, 255, 0.05);
    }

    input[type="file"] {
      padding: 12px;
      border: 2px dashed rgba(255, 255, 255, 0.2);
      cursor: pointer;
    }

    .btn-primary {
      background: linear-gradient(135deg, #00eaff, #0072ff);
      color: white;
      border: none;
      padding: 14px 30px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 234, 255, 0.3);
    }

    /* Data Tables */
    .table-container {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th {
      background: rgba(0, 0, 0, 0.3);
      padding: 18px 25px;
      color: #94a3b8;
      font-weight: 600;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    td {
      padding: 18px 25px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      color: #fff;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background: rgba(255, 255, 255, 0.02);
    }

    .btn-delete {
      background: rgba(255, 65, 108, 0.1);
      color: #ff416c;
      border: 1px solid #ff416c;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }

    .btn-delete:hover {
      background: #ff416c;
      color: white;
      box-shadow: 0 5px 15px rgba(255, 65, 108, 0.4);
    }

    .badge {
      background: rgba(0, 234, 255, 0.1);
      color: #00eaff;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }

  </style>
</head>

<body>

  <!-- Security Check is kept simple for UI purposes, real security requires Firebase Auth state listener, but for this demo localStorage flag is used alongside backend -->
  <script type="module">
    import { db, storage } from './firebase-config.js';
    import { collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

    if (localStorage.getItem("isAdmin") !== "true") {
      alert("Access Denied: You are not an administrator.");
      window.location.href = "home.html";
    }

    // Tab Switching Logic
    const sections = ['dashboard', 'upload', 'notes', 'users'];
    const titles = {
      'dashboard': 'Overview Dashboard',
      'upload': 'Upload Material',
      'notes': 'Manage Notes',
      'users': 'Registered Users'
    };

    window.switchTab = function(tabId, element) {
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      element.classList.add('active');
      document.getElementById('pageTitle').innerText = titles[tabId];
      sections.forEach(sec => document.getElementById(sec).classList.remove('active'));
      document.getElementById(tabId).classList.add('active');

      if(tabId === 'notes' || tabId === 'dashboard') loadNotesData();
      if(tabId === 'users' || tabId === 'dashboard') loadUsersData();
    }

    window.logout = function() {
      localStorage.removeItem('isAdmin');
      window.location.href = "index.html";
    }

    // --- FIREBASE LOGIC ---

    // 1. Upload Form Logic
    document.getElementById("uploadForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const subject = document.getElementById("subjectInput").value.trim();
      const title = document.getElementById("titleInput").value.trim();
      const fileInput = document.getElementById("fileInput");
      const file = fileInput.files[0];

      if (!subject || !title || !file) {
        alert("Please fill all fields.");
        return;
      }

      // Change button state to show loading
      const submitBtn = this.querySelector('button[type="submit"]');
      const originalText = submitBtn.innerHTML;
      submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Uploading...';
      submitBtn.disabled = true;

      try {
        // Step A: Upload PDF to Firebase Cloud Storage
        const storageRef = ref(storage, `notes/${Date.now()}_${file.name}`);
        const snapshot = await uploadBytes(storageRef, file);
        const downloadURL = await getDownloadURL(snapshot.ref);

        // Step B: Save metadata to Firestore
        await addDoc(collection(db, "notes"), {
          subject: subject,
          title: title,
          fileName: file.name,
          downloadURL: downloadURL,
          storagePath: snapshot.ref.fullPath, // Keep path to delete later
          uploadDate: new Date().toLocaleDateString()
        });

        alert("Note uploaded successfully! It is now live on the website.");
        document.getElementById("uploadForm").reset();
        loadNotesData();

      } catch (error) {
        console.error("Error uploading note: ", error);
        alert("Failed to upload note: " + error.message);
      } finally {
        submitBtn.innerHTML = originalText;
        submitBtn.disabled = false;
      }
    });

    // 2. Fetch Notes from Firestore
    async function loadNotesData() {
      const tbody = document.getElementById('notesTableBody');
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:#00eaff;">Loading notes from Firebase...</td></tr>';
      
      try {
        const querySnapshot = await getDocs(collection(db, "notes"));
        const notes = [];
        querySnapshot.forEach((doc) => {
          notes.push({ id: doc.id, ...doc.data() });
        });

        document.getElementById('statNotes').innerText = notes.length;
        tbody.innerHTML = '';

        if (notes.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:#64748b;">No notes uploaded yet.</td></tr>';
          return;
        }

        notes.forEach(note => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td><span class="badge">${note.subject}</span></td>
            <td style="font-weight: 600;">${note.title}</td>
            <td style="color: #94a3b8;"><i class="fa-regular fa-file-pdf"></i> <a href="${note.downloadURL}" target="_blank" style="color: #00eaff; text-decoration: none;">${note.fileName}</a></td>
            <td>${note.uploadDate}</td>
            <td><button class="btn-delete" onclick="deleteNote('${note.id}', '${note.storagePath}')"><i class="fa-solid fa-trash"></i> Delete</button></td>
          `;
          tbody.appendChild(tr);
        });
      } catch(error) {
        console.error("Error fetching notes:", error);
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:#ff416c;">Error loading notes from Firebase.</td></tr>';
      }
    }

    // 3. Delete Note from Storage and Firestore
    window.deleteNote = async function(docId, storagePath) {
      if (confirm("Are you sure you want to delete this note permanently from Firebase?")) {
        try {
          // Delete from Firestore
          await deleteDoc(doc(db, "notes", docId));
          // Delete from Cloud Storage
          const fileRef = ref(storage, storagePath);
          await deleteObject(fileRef);
          
          alert("Note deleted successfully.");
          loadNotesData(); 
        } catch(error) {
          console.error("Error deleting note: ", error);
          alert("Error deleting note: " + error.message);
        }
      }
    }

    // 4. Fetch Users from Firestore
    async function loadUsersData() {
      const tbody = document.getElementById('usersTableBody');
      tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#00eaff;">Loading users from Firebase...</td></tr>';
      
      try {
        const querySnapshot = await getDocs(collection(db, "users"));
        const users = [];
        querySnapshot.forEach((doc) => {
          users.push(doc.data());
        });

        document.getElementById('statUsers').innerText = users.length;
        tbody.innerHTML = '';

        if (users.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#64748b;">No users registered yet.</td></tr>';
          return;
        }

        users.forEach(user => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td style="font-weight: 600;">${user.name || 'Unknown'}</td>
            <td style="color: #94a3b8;">${user.email}</td>
            <td>${user.joinDate || 'N/A'}</td>
            <td><span style="color: #22c55e; background: rgba(34, 197, 94, 0.1); padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;">Active</span></td>
          `;
          tbody.appendChild(tr);
        });
      } catch(error) {
        console.error("Error fetching users:", error);
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#ff416c;">Error loading users from Firebase.</td></tr>';
      }
    }

    // Initial Load
    loadNotesData();
    loadUsersData();

  </script>
</body>

</html>
