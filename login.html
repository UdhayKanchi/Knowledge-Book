<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Portal Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: radial-gradient(circle at center, #1b0f3a 0%, #0a0616 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      overflow: hidden;
      position: relative;
    }

    /* Animated background grid for gaming feel */
    body::before {
      content: '';
      position: absolute;
      width: 200%;
      height: 200%;
      background-image: 
        linear-gradient(rgba(0, 255, 204, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 204, 0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
      animation: gridMove 20s linear infinite;
      z-index: 0;
    }

    @keyframes gridMove {
      0% { transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); }
      100% { transform: perspective(500px) rotateX(60deg) translateY(40px) translateZ(-200px); }
    }

    .login-box {
      background: rgba(15, 10, 30, 0.85);
      backdrop-filter: blur(15px);
      border-radius: 15px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 0 40px rgba(0, 255, 204, 0.2), inset 0 0 20px rgba(255, 0, 255, 0.1);
      border: 1px solid rgba(0, 255, 204, 0.3);
      position: relative;
      z-index: 1;
    }

    /* Cyberpunk decorative corner */
    .login-box::after {
      content: '';
      position: absolute;
      top: -1px;
      right: -1px;
      width: 30px;
      height: 30px;
      border-top: 3px solid #00ffcc;
      border-right: 3px solid #00ffcc;
      border-top-right-radius: 15px;
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 28px;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc;
    }

    .form-group {
      margin-bottom: 25px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #a5b4fc;
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    input {
      width: 100%;
      padding: 14px 15px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      font-size: 15px;
      background-color: rgba(0, 0, 0, 0.5);
      color: #fff;
      transition: all 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #00ffcc;
      box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
      background-color: rgba(0, 255, 204, 0.05);
    }

    input::placeholder {
      color: #64748b;
    }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Orbitron', sans-serif;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .login-btn {
      background: linear-gradient(90deg, #00ffcc, #0088ff);
      color: #000;
      box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
    }

    .login-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 0 30px rgba(0, 255, 204, 0.8);
      color: #fff;
    }

    .register-btn {
      background: transparent;
      color: #ff00ff;
      border: 2px solid #ff00ff;
      margin-top: 15px;
      box-shadow: 0 0 15px rgba(255, 0, 255, 0.2) inset, 0 0 15px rgba(255, 0, 255, 0.2);
    }

    .register-btn:hover {
      background: rgba(255, 0, 255, 0.1);
      box-shadow: 0 0 25px rgba(255, 0, 255, 0.5) inset, 0 0 25px rgba(255, 0, 255, 0.5);
      transform: scale(1.02);
    }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 25px 0;
      color: #64748b;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    .divider span {
      padding: 0 15px;
    }
    
    .google-btn {
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 0;
      font-family: 'Poppins', sans-serif;
      text-transform: none;
    }
    .google-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(255, 255, 255, 0.1);
    }
    .google-btn img {
      width: 22px;
    }
  </style>
</head>

<body>
  <div class="login-box">
    <h2>Access Portal</h2>
    <form id="loginForm">
      <div class="form-group">
        <label for="username">Email or Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your email" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" />
      </div>
      <button type="submit" class="login-btn">Login</button>
      
      <div class="divider">
        <span>OR</span>
      </div>

      <button type="button" class="google-btn" id="googleLoginBtn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
        Sign in with Google
      </button>

      <button type="button" class="register-btn" onclick="redirectToRegister()">Create Account</button>
    </form>
  </div>

  <script type="module">
    import { auth, googleProvider } from './firebase-config.js';
    import { signInWithEmailAndPassword, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { db } from './firebase-config.js';

    // Route Protection: If already logged in, skip login page
    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.replace("home.html");
      }
    });

    document.getElementById("loginForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      const email = document.getElementById("username").value.trim(); // "username" is the email input
      const password = document.getElementById("password").value.trim();

      if (email === "" || password === "") {
        alert("Please enter your details.");
        return;
      }

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // Admin verification
        if (user.email === "knowledgebook@admin.in") {
          localStorage.setItem("isAdmin", "true");
          alert("Login successful! Welcome Admin.");
          // You can route to admin.html directly or home.html where they see the button
          window.location.href = "home.html";
        } else {
          localStorage.setItem("isAdmin", "false");
          alert("Login successful!");
          window.location.href = "home.html";
        }
      } catch (error) {
        console.error("Error signing in:", error);
        if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
          alert("Login failed: Invalid email or password. Please check your credentials and try again.");
        } else if (error.code === 'auth/too-many-requests') {
          alert("Login failed: Too many unsuccessful attempts. Please try again later.");
        } else if (error.code === 'auth/invalid-email') {
          alert("Login failed: Invalid email address format.");
        } else {
          alert("Login failed. Please try again.");
        }
      }
    });

    document.getElementById("googleLoginBtn").addEventListener("click", async function() {
      try {
        const result = await signInWithPopup(auth, googleProvider);
        const user = result.user;

        // Check if user exists in Firestore, if not, create them
        const userDoc = await getDoc(doc(db, "users", user.uid));
        if (!userDoc.exists()) {
          await setDoc(doc(db, "users", user.uid), {
            uid: user.uid,
            name: user.displayName || "Google User",
            email: user.email,
            joinDate: new Date().toLocaleDateString()
          });
        }

        // Admin verification
        if (user.email === "knowledgebook@admin.in") {
          localStorage.setItem("isAdmin", "true");
          alert("Google Login successful! Welcome Admin.");
        } else {
          localStorage.setItem("isAdmin", "false");
          alert("Google Login successful!");
        }
        window.location.href = "home.html";

      } catch (error) {
        console.error("Error with Google Sign-In:", error);
        alert("Google Sign-In failed. Please try again.");
      }
    });

    window.redirectToRegister = function() {
      window.location.href = "register.html";
    }
  </script>
</body>

</html>
