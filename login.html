<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Portal Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      /* Matched the hero section background from index.html */
      background: linear-gradient(135deg, #eef2f8, #f9fbfd);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #333;
    }

    .login-box {
      background: #ffffff;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      /* Matched the subtle shadow from the feature cards */
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      /* Added a top border using the primary brand color for extra flair */
      border-top: 5px solid #5d5dff;
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      color: #5d5dff; /* Primary brand color */
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #666; /* Subtitle color from index */
      font-weight: 600;
      font-size: 0.9rem;
    }

    input {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #e0e6ed;
      border-radius: 10px;
      font-size: 15px;
      background-color: #eef2f8; /* Input background matches main background */
      color: #333;
      transition: border-color 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #5d5dff;
    }

    input::placeholder {
      color: #aaa;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 15px;
      border: none;
      border-radius: 50px; /* Matched pill-shape buttons from index */
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .login-btn {
      /* Matched the main button gradient */
      background: linear-gradient(45deg, #5d5dff, #8a8aff);
      color: white;
      box-shadow: 0 10px 20px rgba(93, 93, 255, 0.25);
    }

    .login-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(93, 93, 255, 0.35);
    }

    .register-btn {
      /* Matched the secondary CTA button */
      background: #ff6b6b;
      color: white;
      margin-top: 15px;
      box-shadow: 0 10px 20px rgba(255, 107, 107, 0.25);
    }

    .register-btn:hover {
      background: #ff4c4c;
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(255, 107, 107, 0.35);
    }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 20px 0;
      color: #aaa;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid #e0e6ed;
    }
    .divider span {
      padding: 0 10px;
      font-size: 0.85rem;
    }
    
    .google-btn {
      background: white;
      color: #333;
      border: 1px solid #e0e6ed;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      margin-top: 0;
    }
    .google-btn:hover {
      background: #f9fbfd;
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0,0,0,0.08);
    }
    .google-btn img {
      width: 20px;
    }
  </style>
</head>

<body>
  <div class="login-box">
    <h2>Access Portal</h2>
    <form id="loginForm">
      <div class="form-group">
        <label for="username">Email or Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your email" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" />
      </div>
      <button type="submit" class="login-btn">Login</button>
      
      <div class="divider">
        <span>OR</span>
      </div>

      <button type="button" class="google-btn" id="googleLoginBtn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
        Sign in with Google
      </button>

      <button type="button" class="register-btn" onclick="redirectToRegister()">Create Account</button>
    </form>
  </div>

  <script type="module">
    import { auth, googleProvider } from './firebase-config.js';
    import { signInWithEmailAndPassword, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { db } from './firebase-config.js';

    // Route Protection: If already logged in, skip login page
    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.replace("home.html");
      }
    });

    document.getElementById("loginForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      const email = document.getElementById("username").value.trim(); // "username" is the email input
      const password = document.getElementById("password").value.trim();

      if (email === "" || password === "") {
        alert("Please enter your details.");
        return;
      }

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // Admin verification
        if (user.email === "knowledgebook@admin.in") {
          localStorage.setItem("isAdmin", "true");
          alert("Login successful! Welcome Admin.");
          // You can route to admin.html directly or home.html where they see the button
          window.location.href = "home.html";
        } else {
          localStorage.setItem("isAdmin", "false");
          alert("Login successful!");
          window.location.href = "home.html";
        }
      } catch (error) {
        console.error("Error signing in:", error);
        if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
          alert("Login failed: Invalid email or password. Please check your credentials and try again.");
        } else if (error.code === 'auth/too-many-requests') {
          alert("Login failed: Too many unsuccessful attempts. Please try again later.");
        } else if (error.code === 'auth/invalid-email') {
          alert("Login failed: Invalid email address format.");
        } else {
          alert("Login failed. Please try again.");
        }
      }
    });

    document.getElementById("googleLoginBtn").addEventListener("click", async function() {
      try {
        const result = await signInWithPopup(auth, googleProvider);
        const user = result.user;

        // Check if user exists in Firestore, if not, create them
        const userDoc = await getDoc(doc(db, "users", user.uid));
        if (!userDoc.exists()) {
          await setDoc(doc(db, "users", user.uid), {
            uid: user.uid,
            name: user.displayName || "Google User",
            email: user.email,
            joinDate: new Date().toLocaleDateString()
          });
        }

        // Admin verification
        if (user.email === "knowledgebook@admin.in") {
          localStorage.setItem("isAdmin", "true");
          alert("Google Login successful! Welcome Admin.");
        } else {
          localStorage.setItem("isAdmin", "false");
          alert("Google Login successful!");
        }
        window.location.href = "home.html";

      } catch (error) {
        console.error("Error with Google Sign-In:", error);
        alert("Google Sign-In failed. Please try again.");
      }
    });

    window.redirectToRegister = function() {
      window.location.href = "register.html";
    }
  </script>
</body>

</html>
